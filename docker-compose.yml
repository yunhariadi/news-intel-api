# v0.1 stack: Postgres+pgvector, Redis, API, worker.
# OpenSearch is intentionally absent — Postgres FTS + pgvector covers v0.1.
# Add it only when a later phase calls for it (see BUILD_ORDER.md).
services:
  api:
    build: .
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: [.env]
    depends_on: [postgres, redis]

  worker:
    build: .
    command: python -m apps.worker.main
    env_file: [.env]
    depends_on: [postgres, redis]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news
      POSTGRES_DB: news_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
